services:

  # OpenWebUI - local source build
  openwebui:
    image: ghcr.io/kwh8121/openwebui-service:${OPENWEBUI_IMAGE_TAG:-local-build}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_HASH: ${OPENWEBUI_BUILD_HASH:-local-build}
        USE_CUDA: ${USE_CUDA:-false}
        USE_OLLAMA: ${USE_OLLAMA:-false}
        USE_SLIM: ${USE_SLIM:-false}
        USE_PERMISSION_HARDENING: ${USE_PERMISSION_HARDENING:-false}
        USE_CUDA_VER: ${USE_CUDA_VER:-cu128}
        USE_EMBEDDING_MODEL: ${USE_EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
        USE_RERANKING_MODEL: ${USE_RERANKING_MODEL:-}
        USE_AUXILIARY_EMBEDDING_MODEL: ${USE_AUXILIARY_EMBEDDING_MODEL:-TaylorAI/bge-micro-v2}
    env_file:
      - ./.env.openwebui.oauth
    ports:
      # - "3001:8080"
      - "80:8080"
    volumes:
      - ${OPENWEBUI_LOCAL_DATA:-/app/backend/data}:/app/backend/data
      # timezone by kwh 0625
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
      - ENABLE_PERSISTENT_CONFIG=true
      - ENABLE_OAUTH_PERSISTENT_CONFIG=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - shared_bridge_network

  # pipelines
  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    ports:
      - "9099:9099"
    volumes:
      - ${PIPELINES_LOCAL_DATA:-/app/pipelines}:/app/pipelines
    extra_hosts:
      - "host.docker.internal:host-gateway"
      # - "localhost:host-gateway"
    restart: unless-stopped
    networks:
      - shared_bridge_network

networks:
  ssrf_proxy_network:
    driver: bridge
    internal: true
  shared_bridge_network:
    driver: bridge
    name: shared_bridge_network

volumes:
  open-webui: {}
