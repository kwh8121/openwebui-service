services:
  openwebui:
    image: ghcr.io/kwh8121/openwebui-service:${OPENWEBUI_IMAGE_TAG:?Set OPENWEBUI_IMAGE_TAG to an immutable GHCR tag}
    env_file:
      - ${OPENWEBUI_DEPLOY_ENV_FILE:-./.env.openwebui.oauth}
    ports:
      - '80:8080'
    volumes:
      - ${OPENWEBUI_LOCAL_DATA:-/app/backend/data}:/app/backend/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - TZ=Asia/Seoul
      - ENABLE_PERSISTENT_CONFIG=true
      - ENABLE_OAUTH_PERSISTENT_CONFIG=true
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - shared_bridge_network

  pipelines:
    image: ghcr.io/open-webui/pipelines:main
    ports:
      - '9099:9099'
    volumes:
      - ${PIPELINES_LOCAL_DATA:-/app/pipelines}:/app/pipelines
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
    networks:
      - shared_bridge_network

networks:
  shared_bridge_network:
    driver: bridge
    name: shared_bridge_network
